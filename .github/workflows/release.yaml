env:
  DIRECTORY: .
  PROJECT_NAME: imp-translate

name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Check version change
        id: version
        uses: rxliuli/version-check@v1
        with:
          file: ${{ env.DIRECTORY }}/package.json

  release:
    permissions:
      contents: write
    needs: version
    if: needs.version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Zip extensions
        run: |
          cd ${{ env.DIRECTORY }}
          pnpm zip
          pnpm zip:firefox

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: 'v${{ needs.version.outputs.version }}'
          name: 'v${{ needs.version.outputs.version }}'
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            ${{ env.DIRECTORY }}/.output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-chrome.zip
            ${{ env.DIRECTORY }}/.output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-firefox.zip
            ${{ env.DIRECTORY }}/.output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-sources.zip

      - name: Submit to Chrome Web Store
        continue-on-error: true
        run: |
          cd ${{ env.DIRECTORY }}
          pnpm wxt submit \
            --chrome-zip .output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Submit to Firefox AMO
        continue-on-error: true
        run: |
          cd ${{ env.DIRECTORY }}
          pnpm wxt submit \
            --firefox-zip .output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-firefox.zip \
            --firefox-sources-zip .output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-sources.zip
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Submit to Edge Add-ons
        continue-on-error: true
        run: |
          cd ${{ env.DIRECTORY }}
          pnpm wxt submit \
            --edge-zip .output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-chrome.zip
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}

  safari:
    needs: version
    if: needs.version.outputs.changed == 'true'
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install

      - name: Build Safari extension
        run: pnpm build:safari

      - name: Setup certificates
        run: |
          security create-keychain -p actions $RUNNER_TEMP/app-signing.keychain-db
          security set-keychain-settings -lut 21600 $RUNNER_TEMP/app-signing.keychain-db
          security unlock-keychain -p actions $RUNNER_TEMP/app-signing.keychain-db
          security default-keychain -s $RUNNER_TEMP/app-signing.keychain-db

          echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode > cert.p12
          security import cert.p12 -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $RUNNER_TEMP/app-signing.keychain-db
          rm cert.p12

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions $RUNNER_TEMP/app-signing.keychain-db

          mkdir -p ~/private_keys
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Install provisioning profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          echo "${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > /tmp/app.provisionprofile
          APP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i /tmp/app.provisionprofile))
          mv /tmp/app.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/$APP_UUID.provisionprofile

          echo "${{ secrets.MACOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > /tmp/ext.provisionprofile
          EXT_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i /tmp/ext.provisionprofile))
          mv /tmp/ext.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/$EXT_UUID.provisionprofile

          echo "APP_PROFILE_UUID=$APP_UUID" >> $GITHUB_ENV
          echo "EXT_PROFILE_UUID=$EXT_UUID" >> $GITHUB_ENV

      - name: Build and archive
        run: |
          cd ".output/Imp Translate"
          xcodebuild -project "Imp Translate.xcodeproj" \
            -scheme "Imp Translate (macOS)" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ImpTranslate.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=N2X78TUUFG \
            CODE_SIGN_IDENTITY="3rd Party Mac Developer Application" \
            APP_PROVISIONING_PROFILE="$APP_PROFILE_UUID" \
            EXTENSION_PROVISIONING_PROFILE="$EXT_PROFILE_UUID"

      - name: Sign and package
        run: |
          APP_PATH="$RUNNER_TEMP/ImpTranslate.xcarchive/Products/Applications/Imp Translate.app"
          ENTITLEMENTS_DIR=".output/Imp Translate"
          SIGN_APP="3rd Party Mac Developer Application: KAI WANG (N2X78TUUFG)"
          SIGN_PKG="3rd Party Mac Developer Installer: KAI WANG (N2X78TUUFG)"

          # Embed provisioning profiles
          cp ~/Library/MobileDevice/Provisioning\ Profiles/$APP_PROFILE_UUID.provisionprofile "$APP_PATH/Contents/embedded.provisionprofile"

          EXT_APP=$(find "$APP_PATH" -path "*/PlugIns/*.appex" -maxdepth 3 | head -1)
          if [ -n "$EXT_APP" ]; then
            cp ~/Library/MobileDevice/Provisioning\ Profiles/$EXT_PROFILE_UUID.provisionprofile "$EXT_APP/Contents/embedded.provisionprofile"
            codesign --force --options runtime --timestamp --sign "$SIGN_APP" "$EXT_APP"
          fi

          codesign --force --options runtime --timestamp --sign "$SIGN_APP" "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"

          productbuild --component "$APP_PATH" /Applications \
            --sign "$SIGN_PKG" \
            "$RUNNER_TEMP/ImpTranslate.pkg"

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type osx \
            --file "$RUNNER_TEMP/ImpTranslate.pkg" \
            --apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER }}"

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf ~/private_keys ~/Library/MobileDevice/Provisioning\ Profiles || true

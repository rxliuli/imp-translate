env:
  DIRECTORY: .
  PROJECT_NAME: imp-translate

name: Release

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Check version change
        id: version
        uses: rxliuli/version-check@v1
        with:
          file: ${{ env.DIRECTORY }}/package.json

  release:
    permissions:
      contents: write
    needs: version
    if: needs.version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      - name: Zip extensions
        run: |
          cd ${{ env.DIRECTORY }}
          pnpm zip
          pnpm zip:firefox

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: 'v${{ needs.version.outputs.version }}'
          name: 'v${{ needs.version.outputs.version }}'
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            ${{ env.DIRECTORY }}/.output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-chrome.zip
            ${{ env.DIRECTORY }}/.output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-firefox.zip
            ${{ env.DIRECTORY }}/.output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-sources.zip

      - name: Submit to Chrome Web Store
        continue-on-error: true
        run: |
          cd ${{ env.DIRECTORY }}
          pnpm wxt submit \
            --chrome-zip .output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Submit to Firefox AMO
        continue-on-error: true
        run: |
          cd ${{ env.DIRECTORY }}
          pnpm wxt submit \
            --firefox-zip .output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-firefox.zip \
            --firefox-sources-zip .output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-sources.zip
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Submit to Edge Add-ons
        continue-on-error: true
        run: |
          cd ${{ env.DIRECTORY }}
          pnpm wxt submit \
            --edge-zip .output/${{ env.PROJECT_NAME }}-${{ needs.version.outputs.version }}-chrome.zip
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}

  safari:
    needs: version
    if: needs.version.outputs.changed == 'true'
    runs-on: macos-26
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install

      - name: Build Safari extension
        run: pnpm build:safari

      - name: Setup certificates
        run: |
          security create-keychain -p actions $RUNNER_TEMP/app-signing.keychain-db
          security set-keychain-settings -lut 21600 $RUNNER_TEMP/app-signing.keychain-db
          security unlock-keychain -p actions $RUNNER_TEMP/app-signing.keychain-db
          security default-keychain -s $RUNNER_TEMP/app-signing.keychain-db

          echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode > cert.p12
          security import cert.p12 -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -A -t cert -f pkcs12 -k $RUNNER_TEMP/app-signing.keychain-db
          rm cert.p12

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions $RUNNER_TEMP/app-signing.keychain-db

          mkdir -p ~/private_keys
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Install provisioning profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          install_profile() {
            local secret_b64="$1" local_name="$2" env_var="$3" ext="$4"
            echo "$secret_b64" | base64 --decode > /tmp/$local_name
            local uuid=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i /tmp/$local_name))
            mv /tmp/$local_name ~/Library/MobileDevice/Provisioning\ Profiles/$uuid.$ext
            echo "$env_var=$uuid" >> $GITHUB_ENV
          }

          install_profile "${{ secrets.APPLE_MACOS_PROVISIONING_PROFILE_BASE64 }}" app.provisionprofile APP_PROFILE_UUID provisionprofile
          install_profile "${{ secrets.APPLE_MACOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}" ext.provisionprofile EXT_PROFILE_UUID provisionprofile
          install_profile "${{ secrets.APPLE_IOS_PROVISIONING_PROFILE_BASE64 }}" ios_app.mobileprovision IOS_APP_PROFILE_UUID mobileprovision
          install_profile "${{ secrets.APPLE_IOS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}" ios_ext.mobileprovision IOS_EXT_PROFILE_UUID mobileprovision

      - name: Create entitlements
        run: |
          cat > /tmp/app.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.application-identifier</key>
              <string>N2X78TUUFG.com.rxliuli.imp-translate</string>
              <key>com.apple.developer.team-identifier</key>
              <string>N2X78TUUFG</string>
              <key>com.apple.security.app-sandbox</key>
              <true/>
              <key>com.apple.security.network.client</key>
              <true/>
          </dict>
          </plist>
          EOF

          cat > /tmp/ext.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.application-identifier</key>
              <string>N2X78TUUFG.com.rxliuli.imp-translate.Extension</string>
              <key>com.apple.developer.team-identifier</key>
              <string>N2X78TUUFG</string>
              <key>com.apple.security.app-sandbox</key>
              <true/>
              <key>com.apple.security.network.client</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Build and archive
        run: |
          cd ".output/Imp Translate"
          xcodebuild -project "Imp Translate.xcodeproj" \
            -scheme "Imp Translate (macOS)" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ImpTranslate.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=12.0 \
            ARCHS="x86_64 arm64" \
            ONLY_ACTIVE_ARCH=NO

      - name: Sign and package
        run: |
          APP_PATH="$RUNNER_TEMP/ImpTranslate.xcarchive/Products/Applications/Imp Translate.app"
          ENTITLEMENTS_DIR=".output/Imp Translate"
          SIGN_APP="3rd Party Mac Developer Application: KAI WANG (N2X78TUUFG)"
          SIGN_PKG="3rd Party Mac Developer Installer: KAI WANG (N2X78TUUFG)"

          # Embed provisioning profiles
          cp ~/Library/MobileDevice/Provisioning\ Profiles/$APP_PROFILE_UUID.provisionprofile "$APP_PATH/Contents/embedded.provisionprofile"

          EXT_APP=$(find "$APP_PATH" -path "*/PlugIns/*.appex" -maxdepth 3 | head -1)
          if [ -n "$EXT_APP" ]; then
            cp ~/Library/MobileDevice/Provisioning\ Profiles/$EXT_PROFILE_UUID.provisionprofile "$EXT_APP/Contents/embedded.provisionprofile"
            codesign --force --options runtime --timestamp --entitlements /tmp/ext.entitlements --sign "$SIGN_APP" "$EXT_APP"
          fi

          codesign --force --options runtime --timestamp --entitlements /tmp/app.entitlements --sign "$SIGN_APP" "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"

          productbuild --component "$APP_PATH" /Applications \
            --sign "$SIGN_PKG" \
            --identifier "com.rxliuli.imp-translate" \
            "$RUNNER_TEMP/ImpTranslate.pkg"

      - name: Upload macOS to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type osx \
            --file "$RUNNER_TEMP/ImpTranslate.pkg" \
            --apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER }}"

      - name: Build iOS archive
        run: |
          cd ".output/Imp Translate"
          xcodebuild -project "Imp Translate.xcodeproj" \
            -scheme "Imp Translate (iOS)" \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ImpTranslate-iOS.xcarchive \
            -sdk iphoneos \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create iOS ExportOptions.plist
        run: |
          cat > /tmp/ExportOptions-iOS.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>N2X78TUUFG</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.rxliuli.imp-translate</key>
                  <string>${IOS_APP_PROFILE_UUID}</string>
                  <key>com.rxliuli.imp-translate.Extension</key>
                  <string>${IOS_EXT_PROFILE_UUID}</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
          </dict>
          </plist>
          EOF

      - name: Export iOS IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ImpTranslate-iOS.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions-iOS.plist \
            -exportPath $RUNNER_TEMP/ios-export

      - name: Upload iOS to App Store Connect
        run: |
          IPA_PATH=$(find $RUNNER_TEMP/ios-export -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER }}"

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf ~/private_keys ~/Library/MobileDevice/Provisioning\ Profiles || true
